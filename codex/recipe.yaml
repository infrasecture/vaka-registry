apiVersion: recipes.vaka/v1alpha1
kind: Recipe
name: codex
version: 0.1.3
description: Codex agent in an egress-restricted container with a LiteLLM gateway sidecar
homepage: https://github.com/infrasecture/vaka-registry/tree/main/codex
tags: [agent, openai, codex, litellm]
minVakaVersion: 0.0.3
env:
  - name: OPENAI_API_KEY
    required: true
    description: Model provider API key, consumed only by the LiteLLM gateway (the agent container never sees it)
  - name: LITELLM_MASTER_KEY
    required: true
    description: Internal key between the agent and the gateway; generated automatically when launching via myCodex
  - name: WORKSPACE_DIR
    default: "./"
    description: Host directory mounted at /workspace inside the agent container
  - name: CODEX_CONTAINER_NAME
    default: codex-dev
    description: Name of the agent container
  - name: MYCODEX_ATTACH_HINT
    default: "<path_to_myCodex>/myCodex"
    description: Attach hint printed inside the container; set automatically by myCodex
