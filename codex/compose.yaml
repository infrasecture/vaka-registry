services:
  codex:
    image: ghcr.io/infrasecture/harness-workstation:latest@sha256:45996ddd4b72925d0259297820567d5a236f6db2c81d4aa604d2f671a31fbeba
    container_name: ${CODEX_CONTAINER_NAME:-codex-dev}
    init: true
    tty: true
    stdin_open: true
    working_dir: ${MYCODEX_WORKDIR:-/workspace}

    environment:
      # Host identity, supplied by ./myCodex, so the container runs as *you*
      # (via gosu): files the agent creates under /workspace stay owned by your
      # host user instead of root. The image entrypoint refuses to start if
      # these are unset — run the stack through ./myCodex, not bare `vaka up`.
      MYCODEX_HOST_UID: ${MYCODEX_HOST_UID:-}
      MYCODEX_HOST_GID: ${MYCODEX_HOST_GID:-}
      MYCODEX_HOST_USER: ${MYCODEX_HOST_USER:-}
      MYCODEX_HOST_GROUP: ${MYCODEX_HOST_GROUP:-}
      MYCODEX_HOST_GROUPS: ${MYCODEX_HOST_GROUPS:-}
      MYCODEX_CONTAINER_HOME: ${MYCODEX_CONTAINER_HOME:-/home/codex}
      MYCODEX_WORKDIR: ${MYCODEX_WORKDIR:-/workspace}
      CODEX_HOME: ${MYCODEX_CODEX_HOME:-/home/codex/.codex}
      CODEX_BYOBU_SESSION: codex
      MYCODEX_ATTACH_HINT: "${MYCODEX_ATTACH_HINT:-<path_to_myCodex>/myCodex}"
      # The agent reaches the model only through the LiteLLM sidecar; this is
      # the internal proxy key, never the upstream provider key.
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
    command: ["bash", "/usr/local/bin/codex-prestart.sh"]

    volumes:
      - ${WORKSPACE_DIR:-./}:${MYCODEX_WORKDIR:-/workspace}
      - codex_state:${MYCODEX_CONTAINER_HOME:-/home/codex}
      - ./codex-prestart.sh:/usr/local/bin/codex-prestart.sh:ro

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-stable@sha256:a1745e629abfb17d434426ff48b115f54f4f4c4a0f5af241de569e93c63c411e
    init: true
    command: ["--config", "/app/config.yaml", "--telemetry", "False", "--debug"]
    environment:
      LITELLM_MASTER_KEY:
      OPENAI_API_KEY:
      DISABLE_ADMIN_UI: "True"
      NO_DOCS: "True"
      NO_REDOC: "True"
      LITELLM_DONT_SHOW_FEEDBACK_BOX: "true"
      OTEL_SDK_DISABLED: "true"
    volumes:
      - ./litellm.config.yaml:/app/config.yaml:ro
    expose:
      - "4000"

volumes:
  codex_state:
