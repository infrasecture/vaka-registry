apiVersion: recipes.vaka/v1alpha1
kind: RegistryIndex
generated: '2026-07-10T22:26:52Z'
recipes:
  codex:
  - version: 0.1.0
    description: Codex agent in an egress-restricted container with a LiteLLM gateway
      sidecar
    tags:
    - agent
    - openai
    - codex
    - litellm
    created: '2026-07-10T22:26:52Z'
    digest: sha256:c2021014b22c8a3029a04fcb24d0750717a628821eca394daa103c598c99a7f1
    urls:
    - https://github.com/infrasecture/vaka-registry/releases/download/codex-0.1.0/codex-0.1.0.tar.gz
    minVakaVersion: 0.0.2
    env:
    - name: OPENAI_API_KEY
      required: true
      description: Model provider API key, consumed only by the LiteLLM gateway (the
        agent container never sees it)
    - name: LITELLM_MASTER_KEY
      required: true
      description: Internal key between the agent and the gateway; generated automatically
        when launching via myCodex
    - name: WORKSPACE_DIR
      default: ./
      description: Host directory mounted at /workspace inside the agent container
    - name: CODEX_CONTAINER_NAME
      default: codex-dev
      description: Name of the agent container
    - name: MYCODEX_ATTACH_HINT
      default: <path_to_myCodex>/myCodex
      description: Attach hint printed inside the container; set automatically by
        myCodex
    policy:
      defaultActions:
        codex: reject
        litellm: reject
      riskFlags: []
